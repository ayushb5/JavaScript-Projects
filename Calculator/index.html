<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div
        class="outerbox d-flex justify-content-center align-items-center vh-100"
      >
        <div class="innerbox bg-warning p-4 text-center">
          <h1>Calculator</h1>
          <div class="bg-white w-100 p-2">
            <input
              type="text"
              class="form-control border-0 shadow-none text-end"
              id="inputVal"
              maxlength="15"
              placeholder=""
            />
            <h4 class="text-end fw-normal" id="result"></h4>
          </div>

          <div
            class="button-group mt-2 d-flex flex-column justify-content-center align-items-center"
          >
            <div class="row g-2 mb-2">
              <div class="col-6">
                <button type="button" class="btn btn-light w-100 rounded">
                  AC
                </button>
              </div>

              <div class="col-6">
                <button
                  type="button"
                  data-value="backSpace"
                  class="btn btn-light w-100 rounded"
                >
                  <i class="bi bi-backspace"></i>
                </button>
              </div>
            </div>

            <div class="row g-2 mb-2">
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  7
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  8
                </button>
              </div>

              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  9
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  -
                </button>
              </div>
            </div>
            <div class="row g-2 mb-2">
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  4
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  5
                </button>
              </div>

              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  6
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  +
                </button>
              </div>
            </div>
            <div class="row g-2 mb-2">
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  1
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  2
                </button>
              </div>

              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  3
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  *
                </button>
              </div>
            </div>
            <div class="row g-2">
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  0
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  .
                </button>
              </div>

              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  =
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light w-100 rounded">
                  /
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
